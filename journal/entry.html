<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Field Notes — Entry</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Outfit:wght@300;400;500;600;800;900&family=Poppins:wght@700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../shared/shared.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        warm: {
                            50: '#fffbf7', 100: '#fdf5eb', 200: '#fbe8d4', 300: '#f5d3b3',
                            400: '#ebad7a', 500: '#e38847', 600: '#d56a31', 700: '#b15129',
                            800: '#8f4228', 900: '#4a2517',
                        }
                    },
                    fontFamily: {
                        mono: ['"JetBrains Mono"', 'monospace'],
                        outfit: ['"Outfit"', 'sans-serif'],
                        handwriting: ['"Caveat"', 'cursive']
                    },
                    fontWeight: { heavy: '900' }
                }
            }
        }
    </script>

    <style>
        /* ── Paragraphs ── */
        .rendered-content p { margin-bottom: 1.5rem; line-height: 1.7; }
        .rendered-content p:last-child { margin-bottom: 0; }

        /* ── Headings ── */
        .rendered-content h2, .rendered-content h3 {
            font-family: 'Outfit', sans-serif;
            font-weight: 900;
            color: #b15129;
            margin-top: 3.5rem;
            margin-bottom: 1.5rem;
            line-height: 1.2;
            display: inline-block;
            position: relative;
        }
        .rendered-content h2 { font-size: 2rem; }
        .rendered-content h3 { font-size: 1.5rem; }
        /* Amber highlighter scribble behind h3 */
        .rendered-content h3::after {
            content: '';
            position: absolute;
            bottom: 2px; left: -5%;
            width: 110%; height: 14px;
            background-color: #f5d3b3;
            z-index: -1;
            border-radius: 10px;
            transform: rotate(-1deg);
        }

        /* ── Blockquote — tilted sticky note ── */
        .rendered-content blockquote {
            font-family: 'Caveat', cursive;
            font-size: 1.75rem;
            line-height: 1.3;
            color: #8f4228;
            background: #fdf5eb;
            padding: 1.5rem 2rem;
            margin: 2.5rem 1.5rem;
            border-radius: 1rem 2rem 2rem 1rem;
            border-left: 6px solid #e38847;
            box-shadow: 4px 6px 0px rgba(227,136,71,0.15);
            transform: rotate(-1.5deg);
        }
        @media (min-width: 768px) {
            .rendered-content blockquote { margin: 2.5rem 4rem; }
        }

        /* ── Bold ── */
        .rendered-content b, .rendered-content strong { font-weight: 900; color: #d56a31; }

        /* ── Mark / highlight ── */
        .rendered-content mark {
            background-color: #fbe8d4;
            color: #8f4228;
            padding: 0.1rem 0.5rem;
            border-radius: 0.5rem;
            font-family: 'Caveat', cursive;
            font-size: 1.1em;
        }

        /* ── Lists — dashed card style ── */
        .rendered-content ul {
            list-style: none;
            padding-left: 0;
            margin: 1.5rem 0 2.5rem;
        }
        .rendered-content ul li {
            position: relative;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            margin-bottom: 0.75rem;
            background: #fffbf7;
            border-radius: 1rem;
            border: 2px dashed #f5d3b3;
            color: #4a2517;
            transition: transform 0.2s;
        }
        .rendered-content ul li:hover { transform: translateX(5px); }
        .rendered-content ul li::before {
            content: '📌';
            position: absolute;
            left: 0.6rem; top: 0.7rem;
            font-size: 1rem;
        }

        /* ── HR — sparkly divider ── */
        .rendered-content hr {
            border: none;
            text-align: center;
            margin: 4rem 0;
            overflow: visible;
        }
        .rendered-content hr::after {
            content: '✧ ✦ ✧ ✦ ✧';
            color: #ebad7a;
            font-size: 1.25rem;
            letter-spacing: 0.5rem;
            display: inline-block;
        }

        /* ── Tangent callout class (optional, for HTML entries) ── */
        .rendered-content .tangent {
            background: #f0fdfa;
            border: 2px solid #5eead4;
            border-radius: 1.5rem;
            padding: 1.5rem;
            margin: 2rem 0;
            color: #0f766e;
        }
        .rendered-content .tangent::before {
            content: '💡 Side thought:';
            display: block;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
            color: #14b8a6;
        }

        /* ── Auto-padding for direct text children (divs/sections break free) ── */
        .rendered-content > p,
        .rendered-content > h1, .rendered-content > h2, .rendered-content > h3, .rendered-content > h4,
        .rendered-content > pre {
            padding-left: 1.5rem;
            padding-right: 1.5rem;
        }
        .rendered-content > ul { padding-left: 1.5rem; padding-right: 1.5rem; }
        @media (min-width: 768px) {
            .rendered-content > p,
            .rendered-content > h1, .rendered-content > h2, .rendered-content > h3, .rendered-content > h4,
            .rendered-content > pre { padding-left: 4rem; padding-right: 4rem; }
            .rendered-content > ul  { padding-left: 4rem; padding-right: 4rem; }
        }

        .spin-slow { animation: spin 2s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen text-warm-900">

    <!-- ── AUTH GATE ── -->
    <div id="auth-gate" class="fixed inset-0 z-50 flex items-center justify-center bg-warm-900/70 backdrop-blur-md">
        <div class="bg-warm-50 rounded-[2rem] border border-warm-200 shadow-2xl p-10 w-full max-w-sm relative">
            <div class="absolute top-0 left-1/2 w-24 h-7 bg-white/50 backdrop-blur-sm border border-white/20 rounded" style="transform: translateX(-50%) rotate(-1.5deg);"></div>
            <div class="text-center mb-8">
                <div class="w-14 h-14 bg-warm-100 border border-warm-200 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-sm">
                    <i class="fa-solid fa-book text-warm-400 text-xl"></i>
                </div>
                <h1 class="font-heavy text-2xl text-warm-900 mb-1">Field Notes</h1>
                <p class="font-mono text-xs text-warm-400 uppercase tracking-widest">Private journal — authorised only</p>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="font-mono text-[10px] text-warm-500 uppercase tracking-widest block mb-1.5">Email</label>
                    <input type="email" id="login-email" placeholder="your@email.com"
                        class="w-full px-4 py-2.5 rounded-xl bg-white border border-warm-200 text-sm font-mono text-warm-800 placeholder-warm-300 focus:outline-none focus:border-warm-400 focus:ring-1 focus:ring-warm-400 shadow-inner">
                </div>
                <div>
                    <label class="font-mono text-[10px] text-warm-500 uppercase tracking-widest block mb-1.5">Password</label>
                    <input type="password" id="login-password" placeholder="••••••••"
                        class="w-full px-4 py-2.5 rounded-xl bg-white border border-warm-200 text-sm font-mono text-warm-800 placeholder-warm-300 focus:outline-none focus:border-warm-400 focus:ring-1 focus:ring-warm-400 shadow-inner"
                        onkeydown="if(event.key==='Enter') login()">
                </div>
                <p id="login-error" class="font-mono text-xs text-red-500 hidden">
                    <i class="fa-solid fa-triangle-exclamation mr-1"></i> <span id="login-error-msg"></span>
                </p>
                <button id="login-btn" onclick="login()"
                    class="w-full bg-warm-900 text-warm-50 font-mono font-bold text-sm py-3 rounded-xl hover:bg-warm-800 transition-colors shadow-sm flex items-center justify-center gap-2 mt-2">
                    <i class="fa-solid fa-lock text-xs text-warm-400"></i> Enter the desk
                </button>
            </div>
        </div>
    </div>

    <!-- ── FIXED TOP CHROME BAR ── -->
    <div id="chrome-bar" class="hidden fixed top-0 left-0 right-0 z-40 bg-white/80 backdrop-blur-md border-b border-warm-200 shadow-sm px-6 py-3 flex justify-between items-center gap-4">
        <button type="button" onclick="window.location.href='index.html'"
            class="inline-flex items-center gap-2 bg-white px-4 py-2 rounded-xl font-mono text-sm font-bold text-warm-700 hover:text-orange-600 hover:bg-warm-50 border border-warm-200 shadow-sm transition-colors cursor-pointer group shrink-0">
            <i class="fa-solid fa-arrow-left transform group-hover:-translate-x-1 transition-transform"></i>
            <span class="hidden sm:inline">Back</span>
        </button>
        <span id="chrome-title" class="font-heavy text-warm-900 text-sm truncate"></span>
        <div class="flex items-center gap-2 shrink-0">
            <button id="edit-btn"
                class="flex items-center gap-2 bg-warm-50 px-4 py-1.5 rounded-xl font-mono font-bold text-warm-600 text-xs shadow-sm border border-warm-200 hover:bg-white hover:text-warm-900 transition-colors">
                <i class="fa-solid fa-pen-nib text-warm-400"></i> Edit
            </button>
            <button id="delete-btn"
                class="flex items-center gap-2 bg-warm-50 px-4 py-1.5 rounded-xl font-mono font-bold text-red-400 text-xs shadow-sm border border-red-100 hover:bg-red-50 hover:border-red-200 hover:text-red-600 transition-colors">
                <i class="fa-solid fa-trash-can opacity-70"></i> Delete
            </button>
        </div>
    </div>

    <!-- ── MAIN (hidden until auth) ── -->
    <main id="main-entry" class="hidden w-full min-h-screen">

        <!-- Loading -->
        <div id="loading-state" class="text-center py-32 text-warm-500 font-mono">
            <i class="fa-solid fa-circle-notch fa-spin text-3xl mb-4 text-warm-300 block"></i>
            <p class="text-sm">Loading entry…</p>
        </div>

        <!-- Entry (populated by JS) -->
        <div id="entry-content" class="hidden w-full pt-14">

            <!-- ── HERO: cover image + overlaid title/receipt ── -->
            <div id="cover-wrapper" class="w-full relative" style="min-height: 70vh;">

                <!-- Fallback: doodle background (always present, behind the photo) -->
                <div class="absolute inset-0 bg-cover bg-center opacity-60" style="background-image: url('../shared/bg_pattern.jpg');"></div>
                <!-- Warm tint over fallback so gradient reads correctly -->
                <div class="absolute inset-0 bg-warm-200/40"></div>

                <!-- Cover photo (fills hero when entry has an image) -->
                <img id="cover-img" src="" alt="Entry cover"
                    class="absolute inset-0 w-full h-full object-cover hidden">

                <!-- Gradient — strong at bottom for text legibility -->
                <div class="absolute inset-x-0 bottom-0 h-3/4 bg-gradient-to-t from-warm-900/90 via-warm-900/40 to-transparent"></div>

                <!-- Title + receipt pinned to bottom of hero -->
                <div class="absolute inset-x-0 bottom-0 px-6 md:px-12 py-10 md:py-14">
                    <div class="max-w-5xl mx-auto flex flex-col md:flex-row md:items-end justify-between gap-6">
                        <div class="flex-1">
                            <h1 id="entry-title" class="font-heavy text-4xl md:text-5xl lg:text-6xl text-white tracking-tight leading-tight" style="text-shadow: 0 2px 16px rgba(74,37,23,0.5);"></h1>
                        </div>
                        <div class="bg-white/10 backdrop-blur-md border border-white/20 p-4 rounded-xl shrink-0 w-full md:w-auto relative shadow-lg">
                            <div class="absolute -left-1.5 -top-1.5 w-3 h-3 bg-orange-400 rounded-full border-2 border-white shadow-sm"></div>
                            <div id="entry-receipt" class="font-mono text-[11px] text-white uppercase leading-relaxed whitespace-nowrap"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Entry body + end actions on solid background -->
            <div class="bg-warm-50">

                <!-- Entry body — fully unconstrained -->
                <div id="entry-body" class="rendered-content w-full font-outfit text-lg md:text-xl text-warm-900 leading-relaxed font-light py-10"></div>

                <!-- End marker -->
                <div class="max-w-4xl mx-auto px-6 py-10 flex items-center gap-3 opacity-40">
                    <i class="fa-solid fa-asterisk text-warm-400 text-sm"></i>
                    <i class="fa-solid fa-asterisk text-warm-400 text-sm"></i>
                    <i class="fa-solid fa-asterisk text-warm-400 text-sm"></i>
                </div>

            </div>

        </div>

        <!-- Error state -->
        <div id="error-state" class="hidden text-center py-32 font-mono text-warm-500">
            <i class="fa-solid fa-ghost text-4xl mb-4 opacity-40 block"></i>
            <p>Entry not found.</p>
            <a href="./" class="mt-4 inline-block text-orange-500 hover:text-orange-700 text-sm font-bold">← Back to Field Notes</a>
        </div>

    </main>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAp4iRTfJ0jWBX5XcTiBAghdN_iCE0Ix4o",
            authDomain: "personal-web-journal.firebaseapp.com",
            projectId: "personal-web-journal",
            storageBucket: "personal-web-journal.firebasestorage.app",
            messagingSenderId: "980592936593",
            appId: "1:980592936593:web:20e8dc2a636a3e8be8e130"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db   = firebase.firestore();

        const entryId = new URLSearchParams(window.location.search).get('id');
        let currentUid = null;

        function userEntries() {
            return db.collection('users').doc(currentUid).collection('entries');
        }

        // ── AUTH ──
        auth.onAuthStateChanged(user => {
            if (user) {
                currentUid = user.uid;
                document.getElementById('auth-gate').classList.add('hidden');
                document.getElementById('main-entry').classList.remove('hidden');
                document.getElementById('chrome-bar').classList.remove('hidden');
                document.getElementById('chrome-bar').style.display = 'flex';
                loadEntry();
            } else {
                currentUid = null;
                document.getElementById('auth-gate').classList.remove('hidden');
                document.getElementById('main-entry').classList.add('hidden');
                document.getElementById('chrome-bar').classList.add('hidden');
            }
        });

        async function login() {
            const email    = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            const btn      = document.getElementById('login-btn');
            const errEl    = document.getElementById('login-error');
            const errMsg   = document.getElementById('login-error-msg');
            if (!email || !password) return;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch spin-slow"></i> Unlocking…';
            btn.disabled  = true;
            errEl.classList.add('hidden');
            try {
                await auth.signInWithEmailAndPassword(email, password);
            } catch (err) {
                errMsg.textContent = 'Wrong email or password.';
                errEl.classList.remove('hidden');
                btn.innerHTML = '<i class="fa-solid fa-lock text-xs text-warm-400"></i> Enter the desk';
                btn.disabled  = false;
            }
        }

        // ── LOAD ENTRY ──
        async function loadEntry() {
            if (!entryId) { showError(); return; }
            try {
                const doc = await userEntries().doc(entryId).get();
                if (!doc.exists) { showError(); return; }
                renderEntry(doc.data());
            } catch (err) {
                showError();
            }
        }

        function renderEntry(e) {
            if (e.title) document.title = `${e.title} — Field Notes`;

            // Chrome bar title
            document.getElementById('chrome-title').textContent = e.title || '';

            // Cover image — hero is always shown; just reveal the <img> when there's a photo
            const imageSrc = e.image
                ? (e.image.startsWith('http') ? e.image : `assets/${e.image}`)
                : null;
            if (imageSrc) {
                const img = document.getElementById('cover-img');
                img.src = imageSrc;
                img.classList.remove('hidden');
            }

            // Title
            document.getElementById('entry-title').textContent = e.title || '(Untitled)';

            // Receipt
            const displayLoc  = e.locationDetail || e.location || '—';
            const displayDate = formatDate(e.date);
            const weather     = formatWeather(e.weather);
            document.getElementById('entry-receipt').innerHTML = `
                <p class="font-bold text-white mb-1.5"><i class="fa-solid fa-location-dot text-orange-300 mr-2 w-3"></i> ${displayLoc.toUpperCase()}</p>
                <p class="text-white/80 mb-1"><i class="fa-regular fa-clock text-white/50 mr-2 w-3"></i> ${displayDate}</p>
                ${weather ? `<p class="text-white/80"><i class="fa-solid fa-cloud text-white/50 mr-2 w-3"></i> ${weather}</p>` : ''}
            `;

            // Body — set innerHTML then re-execute any <script> tags, since browsers
            // block scripts injected via innerHTML. Also patch DOMContentLoaded so
            // scripts that wrap init in that listener still run correctly.
            const bodyEl = document.getElementById('entry-body');
            bodyEl.innerHTML = e.content || '';

            const origAddEventListener = document.addEventListener.bind(document);
            document.addEventListener = function(type, listener, options) {
                if (type === 'DOMContentLoaded') { listener(); return; }
                return origAddEventListener(type, listener, options);
            };
            bodyEl.querySelectorAll('script').forEach(old => {
                const s = document.createElement('script');
                Array.from(old.attributes).forEach(a => s.setAttribute(a.name, a.value));
                s.textContent = old.textContent;
                old.parentNode.replaceChild(s, old);
            });
            document.addEventListener = origAddEventListener;

            // Wire chrome bar buttons
            document.getElementById('edit-btn').onclick   = () => goToEdit();
            document.getElementById('delete-btn').onclick = () => deleteEntry();

            document.getElementById('loading-state').classList.add('hidden');
            document.getElementById('entry-content').classList.remove('hidden');
        }

        function goToEdit() {
            window.location.href = `write.html?id=${entryId}`;
        }

        // ── DELETE ──
        async function deleteEntry() {
            if (!confirm('Delete this memory permanently?')) return;
            const btn = document.getElementById('delete-btn');
            btn.innerHTML = '<i class="fa-solid fa-circle-notch spin-slow"></i>';
            btn.disabled  = true;
            try {
                await userEntries().doc(entryId).delete();
                window.location.href = './';
            } catch (err) {
                alert('Delete failed: ' + err.message);
                btn.innerHTML = '<i class="fa-solid fa-trash-can opacity-70"></i> Delete';
                btn.disabled  = false;
            }
        }

        // ── HELPERS ──
        function formatDate(dateStr) {
            if (!dateStr) return '—';
            const d   = new Date(dateStr);
            const day = String(d.getDate()).padStart(2, '0');
            const mon = d.toLocaleString('en-US', { month: 'short' }).toUpperCase();
            const yr  = d.getFullYear();
            const hh  = String(d.getHours()).padStart(2, '0');
            const mm  = String(d.getMinutes()).padStart(2, '0');
            return `${day} ${mon} ${yr} · ${hh}:${mm}`;
        }

        function formatWeather(w) {
            if (!w) return '';
            if (typeof w === 'string') return w;
            return `${w.temp}°C · ${w.condition}`;
        }

        function showError() {
            document.getElementById('loading-state').classList.add('hidden');
            document.getElementById('error-state').classList.remove('hidden');
        }
    </script>
</body>
</html>
