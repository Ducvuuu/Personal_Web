<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Write Entry — Journal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Outfit:wght@300;400;500;600;800;900&family=Poppins:wght@700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../shared/shared.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        warm: {
                            50: '#fffbf7', 100: '#fdf5eb', 200: '#fbe8d4', 300: '#f5d3b3',
                            400: '#ebad7a', 500: '#e38847', 600: '#d56a31', 700: '#b15129',
                            800: '#8f4228', 900: '#4a2517',
                        }
                    },
                    fontFamily: {
                        mono: ['"JetBrains Mono"', 'monospace'],
                        outfit: ['"Outfit"', 'sans-serif'],
                        handwriting: ['"Caveat"', 'cursive']
                    },
                    fontWeight: { heavy: '900' }
                }
            }
        }
    </script>

    <style>
        textarea { resize: none; overflow-y: auto; }
        input:focus, textarea:focus { outline: none; box-shadow: none; }
        .spin-slow { animation: spin 2s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* ── rendered-content styles (mirrors entry.html exactly) ── */
        .rendered-content p { margin-bottom: 1.5rem; line-height: 1.7; }
        .rendered-content p:last-child { margin-bottom: 0; }
        .rendered-content h2, .rendered-content h3 {
            font-family: 'Outfit', sans-serif; font-weight: 900; color: #b15129;
            margin-top: 3.5rem; margin-bottom: 1.5rem; line-height: 1.2;
            display: inline-block; position: relative;
        }
        .rendered-content h2 { font-size: 2rem; }
        .rendered-content h3 { font-size: 1.5rem; }
        .rendered-content h3::after {
            content: ''; position: absolute; bottom: 2px; left: -5%;
            width: 110%; height: 14px; background-color: #f5d3b3;
            z-index: -1; border-radius: 10px; transform: rotate(-1deg);
        }
        .rendered-content blockquote {
            font-family: 'Caveat', cursive; font-size: 1.75rem; line-height: 1.3;
            color: #8f4228; background: #fdf5eb; padding: 1.5rem 2rem;
            margin: 2.5rem 1.5rem; border-radius: 1rem 2rem 2rem 1rem;
            border-left: 6px solid #e38847;
            box-shadow: 4px 6px 0px rgba(227,136,71,0.15); transform: rotate(-1.5deg);
        }
        .rendered-content b, .rendered-content strong { font-weight: 900; color: #d56a31; }
        .rendered-content mark {
            background-color: #fbe8d4; color: #8f4228; padding: 0.1rem 0.5rem;
            border-radius: 0.5rem; font-family: 'Caveat', cursive; font-size: 1.1em;
        }
        .rendered-content ul { list-style: none; padding-left: 0; margin: 1.5rem 0 2.5rem; }
        .rendered-content ul li {
            position: relative; padding: 0.75rem 1rem 0.75rem 2.5rem;
            margin-bottom: 0.75rem; background: #fffbf7; border-radius: 1rem;
            border: 2px dashed #f5d3b3; color: #4a2517; transition: transform 0.2s;
        }
        .rendered-content ul li:hover { transform: translateX(5px); }
        .rendered-content ul li::before {
            content: '📌'; position: absolute; left: 0.6rem; top: 0.7rem; font-size: 1rem;
        }
        .rendered-content hr {
            border: none; text-align: center; margin: 4rem 0; overflow: visible;
        }
        .rendered-content hr::after {
            content: '✧ ✦ ✧ ✦ ✧'; color: #ebad7a;
            font-size: 1.25rem; letter-spacing: 0.5rem; display: inline-block;
        }

        /* ── Simple editor (contenteditable) ── */
        #simple-body { outline: none; }
        #simple-body:focus { box-shadow: 0 0 0 2px #f5d3b3; }
        #simple-body:empty::before {
            content: attr(data-placeholder);
            color: #f5d3b3;
            pointer-events: none;
            display: block;
            font-weight: 300;
        }
    </style>
</head>

<!-- Body uses shared.css background (bg_pattern.jpg) -->
<body class="min-h-screen flex flex-col text-warm-900">

    <!-- ── AUTH GATE OVERLAY ── -->
    <div id="auth-gate" class="fixed inset-0 z-50 flex items-center justify-center bg-warm-900/70 backdrop-blur-md">
        <div class="bg-warm-50 rounded-[2rem] border border-warm-200 shadow-2xl shadow-warm-900/20 p-10 w-full max-w-sm relative">
            <!-- Washi tape -->
            <div class="absolute top-0 left-1/2 -translate-x-1/2 -translate-y-1/2 w-24 h-7 bg-white/50 backdrop-blur-sm border border-white/20 rounded" style="transform: translateX(-50%) rotate(-1.5deg);"></div>

            <div class="text-center mb-8">
                <div class="w-14 h-14 bg-warm-100 border border-warm-200 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-sm">
                    <i class="fa-solid fa-lock text-warm-400 text-xl"></i>
                </div>
                <h1 class="font-heavy text-2xl text-warm-900 mb-1">Journal Access</h1>
                <p class="font-mono text-xs text-warm-400 uppercase tracking-widest">Private desk — authorised only</p>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="font-mono text-[10px] text-warm-500 uppercase tracking-widest block mb-1.5">Email</label>
                    <input type="email" id="login-email" placeholder="your@email.com"
                        class="w-full px-4 py-2.5 rounded-xl bg-white border border-warm-200 text-sm font-mono text-warm-800 placeholder-warm-300 focus:outline-none focus:border-warm-400 focus:ring-1 focus:ring-warm-400 shadow-inner">
                </div>
                <div>
                    <label class="font-mono text-[10px] text-warm-500 uppercase tracking-widest block mb-1.5">Password</label>
                    <input type="password" id="login-password" placeholder="••••••••"
                        class="w-full px-4 py-2.5 rounded-xl bg-white border border-warm-200 text-sm font-mono text-warm-800 placeholder-warm-300 focus:outline-none focus:border-warm-400 focus:ring-1 focus:ring-warm-400 shadow-inner"
                        onkeydown="if(event.key==='Enter') login()">
                </div>

                <p id="login-error" class="font-mono text-xs text-red-500 hidden">
                    <i class="fa-solid fa-triangle-exclamation mr-1"></i> <span id="login-error-msg"></span>
                </p>

                <button id="login-btn" onclick="login()"
                    class="w-full bg-warm-900 text-warm-50 font-mono font-bold text-sm py-3 rounded-xl hover:bg-warm-800 transition-colors shadow-sm flex items-center justify-center gap-2 mt-2">
                    <i class="fa-solid fa-lock text-xs text-warm-400"></i> Enter the desk
                </button>
            </div>
        </div>
    </div>

    <!-- ── EDITOR (shown after auth) ── -->
    <!-- Minimal nav — fixed top -->
    <nav class="fixed top-0 left-0 right-0 z-40 bg-white/90 backdrop-blur-md border-b border-warm-200 shadow-sm flex justify-between items-center px-6 py-3 hidden" id="editor-nav">
            <a href="./" class="bg-white/80 backdrop-blur-md px-5 py-2.5 rounded-xl font-mono font-bold text-warm-800 text-sm shadow-sm border border-warm-200 hover:bg-white transition-colors flex items-center gap-2">
                <i class="fa-solid fa-arrow-left text-warm-400"></i> Back to Desk
            </a>
            <div class="font-handwriting text-2xl text-warm-600 opacity-70 transform rotate-1">Drafting…</div>
            <button onclick="logout()"
                class="bg-white/80 backdrop-blur-md px-4 py-2.5 rounded-xl font-mono text-warm-500 text-xs shadow-sm border border-warm-200 hover:bg-white hover:text-warm-800 transition-colors flex items-center gap-2">
                <i class="fa-solid fa-right-from-bracket"></i> Lock
            </button>
    </nav>

    <!-- ── EDITOR (shown after auth) ── -->
    <main id="editor-container" class="hidden w-full flex-1 flex flex-col pt-14 pb-20 bg-warm-50">

        <div class="px-8 md:px-16 py-8 flex flex-col flex-1">

            <!-- Fields — constrained width for comfortable writing -->
            <div class="max-w-5xl mx-auto w-full">

                <!-- Metadata + Cover Photo -->
                <div class="flex flex-col lg:flex-row gap-8 mb-10 pb-10 border-b border-warm-200">

                    <!-- Left: Metadata Receipt -->
                    <div class="w-full lg:w-1/3 flex flex-col justify-start">
                        <div class="bg-warm-50/80 border border-warm-200 p-5 relative shadow-inner h-full flex flex-col justify-center rounded-lg">
                            <div class="absolute -left-1.5 -top-1.5 w-3 h-3 bg-orange-500 rounded-full border-2 border-white shadow-sm"></div>

                            <!-- Live Clock -->
                            <div class="font-mono text-[10px] sm:text-xs text-warm-800 uppercase leading-relaxed mb-4 pb-4 border-b border-warm-200/60">
                                <p class="text-warm-500 font-bold mb-1">CURRENT TIME</p>
                                <p id="live-time">--:-- · -- --- ----</p>
                            </div>

                            <!-- Geo / Weather -->
                            <div class="font-mono text-[10px] sm:text-xs text-warm-800 uppercase leading-relaxed" id="geo-receipt">
                                <p class="text-warm-500 font-bold mb-2">ENVIRONMENT DATA</p>
                                <p class="mb-1 text-warm-400 italic">Location unverified.</p>
                                <button onclick="stampEnvironment()" id="stamp-btn"
                                    class="mt-3 bg-white border border-warm-300 shadow-sm px-3 py-1.5 rounded text-[10px] font-bold text-orange-600 hover:bg-orange-50 transition-colors flex items-center gap-2 w-fit">
                                    <i class="fa-solid fa-location-crosshairs"></i> Stamp Location & Weather
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Right: Cover Image -->
                    <div class="w-full lg:w-2/3">
                        <input type="file" id="image-file-input" accept="image/*" class="hidden"
                            onchange="handleImageFile(this.files[0])">
                        <div id="image-dropzone"
                            class="w-full h-48 sm:h-56 border-2 border-dashed border-warm-300 rounded-xl bg-warm-50/50 hover:bg-warm-100/50 transition-colors flex flex-col items-center justify-center relative overflow-hidden text-center p-6 cursor-pointer select-none"
                            onclick="document.getElementById('image-file-input').click()"
                            ondragover="event.preventDefault(); this.classList.add('border-orange-400','bg-orange-50/30')"
                            ondragleave="this.classList.remove('border-orange-400','bg-orange-50/30')"
                            ondrop="event.preventDefault(); this.classList.remove('border-orange-400','bg-orange-50/30'); handleImageFile(event.dataTransfer.files[0])">
                            <i id="upload-icon" class="fa-solid fa-cloud-arrow-up text-2xl text-warm-300 mb-2"></i>
                            <p class="font-mono text-xs font-bold text-warm-600">Drop image here or click to browse</p>
                            <p id="upload-status" class="font-outfit text-sm text-warm-400 mt-1">Uploads straight to <code>journal/assets/</code> on GitHub</p>
                            <img id="image-preview" src="" class="absolute inset-0 w-full h-full object-cover hidden z-10" alt="Cover Preview">
                            <button id="remove-img-btn" onclick="removeImage(event)"
                                class="absolute top-3 right-3 bg-warm-900/50 backdrop-blur text-white w-8 h-8 rounded-full items-center justify-center hidden z-20 hover:bg-red-500 transition-colors flex">
                                <i class="fa-solid fa-times"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Location + Title + Toggle -->
                <div class="flex items-center gap-2 mb-6">
                    <i class="fa-solid fa-location-dot text-warm-400"></i>
                    <input type="text" id="location-detail" placeholder="Specific place? (e.g. Back of a Grab car, Senopati)"
                        class="w-full font-mono text-sm font-bold text-warm-600 placeholder-warm-300 bg-transparent border-none focus:outline-none">
                </div>

                <input type="text" id="entry-title" placeholder="A title for this moment…"
                    class="w-full font-heavy text-4xl sm:text-5xl lg:text-6xl text-warm-900 placeholder-warm-200 bg-transparent border-none mb-6 tracking-tight focus:outline-none">

                <div class="flex justify-between items-end mb-4">
                    <span id="mode-label" class="font-mono text-xs text-warm-400 uppercase tracking-widest pl-2">Simple</span>
                    <div class="flex items-center bg-warm-100/50 p-1 rounded-xl border border-warm-200 shadow-inner">
                        <button id="btn-simple" onclick="toggleEditor('simple')"
                            class="px-4 py-1.5 rounded-lg text-xs font-bold transition-all bg-white shadow-sm text-warm-900">
                            <i class="fa-solid fa-feather mr-1"></i> Simple
                        </button>
                        <button id="btn-code" onclick="toggleEditor('code')"
                            class="px-4 py-1.5 rounded-lg text-xs font-bold transition-all text-warm-500 hover:text-warm-900 bg-transparent">
                            <i class="fa-solid fa-code mr-1"></i> Code
                        </button>
                        <button id="btn-preview" onclick="toggleEditor('preview')"
                            class="px-4 py-1.5 rounded-lg text-xs font-bold transition-all text-warm-500 hover:text-warm-900 bg-transparent hidden">
                            <i class="fa-solid fa-eye mr-1"></i> Preview
                        </button>
                    </div>
                </div>

            </div><!-- end constrained fields -->

            <!-- Simple mode — styled contenteditable, WYSIWYG -->
            <div id="simple-body"
                contenteditable="true"
                data-placeholder="Just write… press Enter for a new paragraph."
                class="rendered-content w-full bg-[#fdfcf6] border border-warm-200 rounded-2xl px-8 md:px-16 py-10 shadow-inner transition-all mt-4 font-outfit text-lg sm:text-xl text-warm-900 leading-relaxed font-light"
                style="min-height: 65vh;"></div>

            <!-- Code mode — raw HTML textarea -->
            <textarea id="journal-body"
                placeholder="<p>Start writing your HTML here…</p>"
                class="w-full font-mono text-sm sm:text-base text-warm-800 placeholder-warm-300 bg-[#fdfcf6] border border-warm-200 rounded-2xl p-6 shadow-inner leading-relaxed focus:ring-2 focus:ring-warm-300 transition-all mt-4 hidden"
                style="min-height: 65vh;"></textarea>

            <!-- Preview mode — renders Code textarea -->
            <div id="journal-preview" class="rendered-content w-full min-h-[65vh] font-outfit text-lg sm:text-xl text-warm-900 leading-relaxed font-light hidden mt-4 px-8 md:px-16 py-8"></div>

        </div>
    </main>

    <!-- Action Bar — fixed bottom -->
    <div class="fixed bottom-0 left-0 right-0 z-40 bg-warm-100/80 backdrop-blur-md px-8 py-5 border-t border-warm-200 flex flex-col sm:flex-row justify-between items-center gap-4 hidden" id="editor-actions">
        <p id="save-status" class="font-mono text-xs text-warm-400 flex items-center gap-2">
            <i class="fa-solid fa-cloud-arrow-up"></i> Ready to seal.
        </p>
        <div class="flex gap-3 w-full sm:w-auto">
            <button onclick="discardEntry()" class="flex-1 sm:flex-none px-6 py-2.5 rounded-xl font-bold font-mono text-sm border border-warm-300 text-warm-700 hover:bg-white transition-colors bg-warm-50 text-center">
                Discard
            </button>
            <button id="draft-btn" onclick="saveDraft()"
                class="flex-1 sm:flex-none px-6 py-2.5 rounded-xl font-bold font-mono text-sm border border-warm-400 text-warm-700 hover:bg-warm-100 transition-colors bg-white flex items-center justify-center gap-2">
                <i class="fa-regular fa-floppy-disk text-xs opacity-70"></i> Save Draft
            </button>
            <button id="save-btn" onclick="saveEntry()"
                class="flex-1 sm:flex-none px-6 py-2.5 rounded-xl font-bold font-mono text-sm shadow-md text-warm-50 bg-orange-600 hover:bg-orange-700 transition-colors flex items-center justify-center gap-2">
                <i class="fa-solid fa-lock text-xs opacity-70"></i> Seal & Save
            </button>
        </div>
    </div>

    <!-- Firebase compat SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

    <script>
        // ── FIREBASE INIT ──
        const firebaseConfig = {
            apiKey: "AIzaSyAp4iRTfJ0jWBX5XcTiBAghdN_iCE0Ix4o",
            authDomain: "personal-web-journal.firebaseapp.com",
            projectId: "personal-web-journal",
            storageBucket: "personal-web-journal.firebasestorage.app",
            messagingSenderId: "980592936593",
            appId: "1:980592936593:web:20e8dc2a636a3e8be8e130"
        };
        firebase.initializeApp(firebaseConfig);
        const auth    = firebase.auth();
        const db      = firebase.firestore();
        const storage = firebase.storage();

        // ── STATE ──
        let currentImageValue = '';
        let currentMode = 'simple';
        const editId = new URLSearchParams(window.location.search).get('id');
        let draftId  = new URLSearchParams(window.location.search).get('draft');

        // Ensure Enter in contenteditable produces <p> not <div>
        try { document.execCommand('defaultParagraphSeparator', false, 'p'); } catch(e) {}

        // ── AUTH STATE ──
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('auth-gate').classList.add('hidden');
                document.getElementById('editor-container').classList.remove('hidden');
                const nav = document.getElementById('editor-nav');
                nav.classList.remove('hidden');
                nav.style.display = 'flex';
                const actions = document.getElementById('editor-actions');
                actions.classList.remove('hidden');
                actions.style.display = 'flex';
                if (editId)       loadEntryForEdit(editId);
                else if (draftId) loadDraftForEdit(draftId);
            } else {
                document.getElementById('auth-gate').classList.remove('hidden');
                document.getElementById('editor-container').classList.add('hidden');
                document.getElementById('editor-nav').classList.add('hidden');
                document.getElementById('editor-actions').classList.add('hidden');
            }
        });

        async function loadEntryForEdit(id) {
            try {
                const doc = await db.collection('entries').doc(id).get();
                if (!doc.exists) return;
                const e = doc.data();
                document.getElementById('entry-title').value    = e.title        || '';
                document.getElementById('journal-body').value   = e.content      || '';
                document.getElementById('location-detail').value = e.locationDetail || '';
                capturedDate     = e.date     || '';
                capturedLocation = e.location || '';
                capturedLat      = e.lat      || null;
                capturedLng      = e.lng      || null;
                capturedWeather  = e.weather  || '';
                if (e.image) {
                    currentImageValue = e.image;
                    showImagePreview(e.image);
                    setUploadStatus('done', '✓ Existing image');
                }
                // Update UI labels for edit mode
                document.querySelector('h1.font-heavy') && (document.querySelector('h1.font-heavy').textContent = 'Edit Entry');
                const saveBtn = document.getElementById('save-btn');
                saveBtn.innerHTML = '<i class="fa-solid fa-pen-nib text-xs opacity-70"></i> Update Entry';
                toggleEditor('code'); // existing HTML always opens in Code mode
            } catch (err) {
                console.error('Failed to load entry for edit:', err);
            }
        }

        async function loadDraftForEdit(id) {
            try {
                const doc = await db.collection('entries').doc(id).get();
                if (!doc.exists) return;
                const e = doc.data();
                document.getElementById('entry-title').value     = e.title          || '';
                document.getElementById('journal-body').value    = e.content        || '';
                document.getElementById('location-detail').value = e.locationDetail || '';
                capturedDate     = e.date     || capturedDate;
                capturedLocation = e.location || '';
                capturedLat      = e.lat      || null;
                capturedLng      = e.lng      || null;
                capturedWeather  = e.weather  || null;
                if (e.image) {
                    currentImageValue = e.image;
                    showImagePreview(e.image);
                    setUploadStatus('done', '✓ Existing image');
                }
                toggleEditor('code'); // drafts are stored as HTML, open in Code mode
                document.getElementById('save-status').innerHTML =
                    '<i class="fa-regular fa-floppy-disk text-warm-400"></i> Draft loaded — keep writing.';
            } catch (err) {
                console.error('Failed to load draft:', err);
            }
        }

        async function login() {
            const email    = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            const btn      = document.getElementById('login-btn');
            const errEl    = document.getElementById('login-error');
            const errMsg   = document.getElementById('login-error-msg');

            if (!email || !password) return;

            btn.innerHTML = '<i class="fa-solid fa-circle-notch spin-slow"></i> Unlocking…';
            btn.disabled  = true;
            errEl.classList.add('hidden');

            try {
                await auth.signInWithEmailAndPassword(email, password);
            } catch (err) {
                errMsg.textContent = 'Wrong email or password.';
                errEl.classList.remove('hidden');
                btn.innerHTML = '<i class="fa-solid fa-lock text-xs text-warm-400"></i> Enter the desk';
                btn.disabled  = false;
            }
        }

        function logout() {
            auth.signOut();
        }

        // ── LIVE CLOCK ──
        function updateClock() {
            const now     = new Date();
            const timeStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
            const dateStr = now.toLocaleDateString('en-US', { day: '2-digit', month: 'short', year: 'numeric' });
            document.getElementById('live-time').innerHTML = `${timeStr} &middot; ${dateStr}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // ── CAPTURED STATE (set by stampEnvironment) ──
        let capturedLocation   = '';
        let capturedLat        = null;
        let capturedLng        = null;
        let capturedWeather    = null;
        let capturedDate       = new Date().toISOString();

        // ── GEOLOCATION + WEATHER ──
        async function stampEnvironment() {
            const receiptDiv = document.getElementById('geo-receipt');
            const btn        = document.getElementById('stamp-btn');

            btn.innerHTML = '<i class="fa-solid fa-circle-notch spin-slow"></i> Connecting to satellites…';
            btn.disabled  = true;

            if (!navigator.geolocation) {
                showGeoError('Geolocation not supported by this browser.');
                return;
            }

            navigator.geolocation.getCurrentPosition(async pos => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;

                try {
                    const geoRes  = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`);
                    const geoData = await geoRes.json();
                    const city    = geoData.address.city || geoData.address.town || geoData.address.state || 'Unknown';
                    const country = geoData.address.country || '';
                    const location = `${city}, ${country}`;

                    const wxRes   = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
                    const wxData  = await wxRes.json();
                    const temp    = Math.round(wxData.current_weather.temperature);
                    const code    = wxData.current_weather.weathercode;

                    let condition = 'Clear';
                    if (code >= 1  && code <= 3)  condition = 'Cloudy';
                    if (code >= 45 && code <= 48) condition = 'Hazy';
                    if (code >= 51 && code <= 67) condition = 'Rainy';
                    if (code >= 71 && code <= 77) condition = 'Snow';
                    if (code >= 95)               condition = 'Stormy';

                    // Store for Firestore save
                    capturedLocation = location;
                    capturedLat      = lat;
                    capturedLng      = lon;
                    capturedWeather  = { temp, condition, wmoCode: code };
                    capturedDate     = new Date().toISOString();

                    receiptDiv.innerHTML = `
                        <p class="font-bold text-warm-900 mb-1"><i class="fa-solid fa-location-dot text-orange-500 mr-1.5 w-3"></i> ${location.toUpperCase()}</p>
                        <p class="text-warm-700 mb-1"><i class="fa-solid fa-map-pin text-warm-400 mr-1.5 w-3"></i> LAT ${lat.toFixed(4)}, LNG ${lon.toFixed(4)}</p>
                        <p class="text-warm-700"><i class="fa-solid fa-cloud text-warm-400 mr-1.5 w-3"></i> ${temp}&deg;C &middot; ${condition.toUpperCase()}</p>
                        <div class="mt-3 text-[9px] text-green-600 flex items-center gap-1 opacity-70">
                            <i class="fa-solid fa-check-circle"></i> Environment locked
                        </div>`;

                } catch (err) {
                    showGeoError('Failed to fetch environment data.');
                }
            }, () => showGeoError('GPS access denied or unavailable.'));
        }

        function showGeoError(msg) {
            const btn = document.getElementById('stamp-btn');
            btn.innerHTML  = `<i class="fa-solid fa-triangle-exclamation"></i> ${msg}`;
            btn.className  = 'mt-3 bg-red-50 border border-red-200 px-3 py-1.5 rounded text-[10px] font-bold text-red-600 flex items-center gap-2 w-fit';
            btn.disabled   = false;
        }

        // ── IMAGE UPLOAD (Firebase Storage) ──
        function handleImageFile(file) {
            if (!file || !file.type.startsWith('image/')) return;

            // Immediate local preview
            const localUrl = URL.createObjectURL(file);
            showImagePreview(localUrl);
            setUploadStatus('uploading', 'Uploading… 0%');

            const ext      = file.name.split('.').pop().toLowerCase();
            const ts       = new Date().toISOString().replace(/\D/g, '').substring(0, 15);
            const safeName = file.name.replace(/\.[^.]+$/, '').replace(/[^a-zA-Z0-9]/g, '-').substring(0, 30);
            const filename = `journal/${ts}_${safeName}.${ext}`;

            const uploadTask = storage.ref(filename).put(file);

            uploadTask.on('state_changed',
                snapshot => {
                    const pct = Math.round(snapshot.bytesTransferred / snapshot.totalBytes * 100);
                    setUploadStatus('uploading', `Uploading… ${pct}%`);
                },
                err => {
                    setUploadStatus('error', `Upload failed: ${err.message}`);
                    currentImageValue = '';
                },
                async () => {
                    const downloadURL = await uploadTask.snapshot.ref.getDownloadURL();
                    currentImageValue = downloadURL;
                    URL.revokeObjectURL(localUrl);
                    showImagePreview(downloadURL);
                    setUploadStatus('done', '✓ Uploaded');
                }
            );
        }

        function showImagePreview(src) {
            const preview   = document.getElementById('image-preview');
            const removeBtn = document.getElementById('remove-img-btn');
            preview.src = src;
            preview.classList.remove('hidden');
            removeBtn.classList.remove('hidden');
            removeBtn.style.display = 'flex';
        }

        function setUploadStatus(state, message) {
            const icon   = document.getElementById('upload-icon');
            const status = document.getElementById('upload-status');
            status.textContent = message;
            if (state === 'uploading') icon.className = 'fa-solid fa-circle-notch spin-slow text-2xl text-warm-400 mb-2';
            if (state === 'done')      icon.className = 'fa-solid fa-check-circle text-2xl text-green-500 mb-2';
            if (state === 'error')     icon.className = 'fa-solid fa-triangle-exclamation text-2xl text-red-400 mb-2';
        }

        function removeImage(e) {
            e.stopPropagation();
            currentImageValue = '';
            document.getElementById('image-preview').src = '';
            document.getElementById('image-preview').classList.add('hidden');
            document.getElementById('remove-img-btn').classList.add('hidden');
            document.getElementById('upload-icon').className = 'fa-solid fa-cloud-arrow-up text-2xl text-warm-300 mb-2';
            document.getElementById('upload-status').textContent = 'Uploads straight to journal/assets/ on GitHub';
            document.getElementById('image-file-input').value = '';
        }

        // ── EDITOR TOGGLE ──
        function toggleEditor(mode) {
            currentMode = mode;

            const simpleEl  = document.getElementById('simple-body');
            const codeEl    = document.getElementById('journal-body');
            const previewEl = document.getElementById('journal-preview');
            const btnSimple  = document.getElementById('btn-simple');
            const btnCode    = document.getElementById('btn-code');
            const btnPreview = document.getElementById('btn-preview');
            const label      = document.getElementById('mode-label');

            const on  = 'px-4 py-1.5 rounded-lg text-xs font-bold transition-all bg-white shadow-sm text-warm-900';
            const off = 'px-4 py-1.5 rounded-lg text-xs font-bold transition-all text-warm-500 hover:text-warm-900 bg-transparent';

            // Hide all panels, reset all buttons
            simpleEl.classList.add('hidden');
            codeEl.classList.add('hidden');
            previewEl.classList.add('hidden');
            btnSimple.className  = off;
            btnCode.className    = off;
            btnPreview.className = off;

            if (mode === 'simple') {
                simpleEl.classList.remove('hidden');
                btnSimple.className = on;
                btnPreview.classList.add('hidden');    // Preview not relevant in simple
                label.textContent = 'Simple';
                simpleEl.focus();
            } else if (mode === 'code') {
                codeEl.classList.remove('hidden');
                btnCode.className = on;
                btnPreview.classList.remove('hidden'); // Preview appears in code mode
                label.textContent = 'HTML';
            } else { // preview
                previewEl.classList.remove('hidden');
                btnPreview.className = on;
                btnPreview.classList.remove('hidden');
                label.textContent = 'Preview';
                const html = codeEl.value.trim();
                previewEl.innerHTML = html || '<span style="color:#f5d3b3;font-style:italic;">Nothing to preview yet…</span>';
            }
        }

        // ── GET CONTENT (mode-aware) ──
        function getContent() {
            if (currentMode === 'simple') return document.getElementById('simple-body').innerHTML;
            return document.getElementById('journal-body').value.trim();
        }

        // ── SAVE DRAFT TO FIRESTORE ──
        async function saveDraft() {
            const title          = document.getElementById('entry-title').value.trim();
            const content        = getContent();
            const locationDetail = document.getElementById('location-detail').value.trim();

            const draftBtn = document.getElementById('draft-btn');
            const status   = document.getElementById('save-status');
            draftBtn.innerHTML = '<i class="fa-solid fa-circle-notch spin-slow"></i> Saving…';
            draftBtn.disabled  = true;
            status.innerHTML   = '<i class="fa-solid fa-circle-notch spin-slow text-warm-400"></i> Saving draft…';

            try {
                const data = {
                    date:           capturedDate,
                    location:       capturedLocation,
                    locationDetail: locationDetail,
                    lat:            capturedLat,
                    lng:            capturedLng,
                    weather:        capturedWeather,
                    image:          currentImageValue,
                    title:          title,
                    content:        content,
                    status:         'draft'
                };

                if (draftId) {
                    await db.collection('entries').doc(draftId).update(data);
                } else {
                    data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
                    const docRef = await db.collection('entries').add(data);
                    draftId = docRef.id;
                    history.replaceState(null, '', `?draft=${draftId}`);
                }

                const now     = new Date();
                const timeStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
                status.innerHTML   = `<i class="fa-solid fa-check text-green-500"></i> Draft saved at ${timeStr}`;
                draftBtn.innerHTML = '<i class="fa-regular fa-floppy-disk text-xs opacity-70"></i> Save Draft';
                draftBtn.disabled  = false;
            } catch (err) {
                status.innerHTML   = `<i class="fa-solid fa-triangle-exclamation text-red-500"></i> Draft save failed: ${err.message}`;
                draftBtn.innerHTML = '<i class="fa-regular fa-floppy-disk text-xs opacity-70"></i> Save Draft';
                draftBtn.disabled  = false;
            }
        }

        // ── DISCARD ──
        async function discardEntry() {
            if (draftId) {
                if (!confirm('Delete this draft? This cannot be undone.')) return;
                try { await db.collection('entries').doc(draftId).delete(); } catch (e) {}
            }
            window.location.href = './';
        }

        // ── SEAL & SAVE TO FIRESTORE ──
        async function saveEntry() {
            const title          = document.getElementById('entry-title').value.trim();
            const content        = getContent();
            const locationDetail = document.getElementById('location-detail').value.trim();
            const imageFilename  = currentImageValue;

            if (!title && !content) {
                document.getElementById('save-status').innerHTML =
                    '<i class="fa-solid fa-triangle-exclamation text-orange-500"></i> Write something first.';
                return;
            }

            const saveBtn = document.getElementById('save-btn');
            const status  = document.getElementById('save-status');
            saveBtn.innerHTML = '<i class="fa-solid fa-circle-notch spin-slow"></i> Sealing…';
            saveBtn.disabled  = true;
            status.innerHTML  = '<i class="fa-solid fa-cloud-arrow-up text-warm-400"></i> Saving to cloud…';

            try {
                const data = {
                    date:           capturedDate,
                    location:       capturedLocation,
                    locationDetail: locationDetail,
                    lat:            capturedLat,
                    lng:            capturedLng,
                    weather:        capturedWeather,
                    image:          imageFilename,
                    title:          title,
                    content:        content,
                    status:         'published'
                };
                if (editId) {
                    await db.collection('entries').doc(editId).update(data);
                    window.location.href = `entry.html?id=${editId}`;
                } else if (draftId) {
                    await db.collection('entries').doc(draftId).update(data);
                    window.location.href = './';
                } else {
                    data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
                    await db.collection('entries').add(data);
                    window.location.href = './';
                }
            } catch (err) {
                status.innerHTML  = `<i class="fa-solid fa-triangle-exclamation text-red-500"></i> Save failed: ${err.message}`;
                saveBtn.innerHTML = '<i class="fa-solid fa-lock text-xs opacity-70"></i> Seal & Save';
                saveBtn.disabled  = false;
            }
        }
    </script>
</body>
